[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-mini-box-core"
version = "5.0.1"
description = "AI mini box core — system core for small business automation"
requires-python = ">=3.12"
readme = "README.md"
license = { file = "LICENSE" }
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business",
]
dependencies = [
    "typer>=0.12",
    "SQLAlchemy>=2.0",
    "loguru>=0.7",
    "pydantic>=2.0",
    "alembic>=1.13",
    "cryptography>=42",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-xdist>=3", "pytest-cov>=5"]

[project.urls]
Homepage = "https://github.com/Kibertum/ai-mini-box"
Repository = "https://github.com/Kibertum/ai-mini-box"
Documentation = "https://github.com/Kibertum/ai-mini-box"

[project.scripts]
ai-mini-box = "ai_mini_box.cli:app"

[tool.hatch.build]
include = ["ai_mini_box/**"]
