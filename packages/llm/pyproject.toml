[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-mini-box-llm"
version = "0.1.0"
description = "LLM plugin for ai-mini-box — local and remote inference, RAG"
requires-python = ">=3.12"
readme = "README.md"
license = { file = "LICENSE" }
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "ai-mini-box-core>=5.0.0",
]

[project.optional-dependencies]
local = ["llama-cpp-python>=0.2"]
remote = ["openai>=1.0"]
download = ["huggingface-hub>=0.20"]
dev = ["pytest>=8"]

[project.urls]
Homepage = "https://github.com/Kibertum/ai-mini-box"
Repository = "https://github.com/Kibertum/ai-mini-box"

[project.entry-points."ai_mini_box.tools"]
llm = "ai_mini_box_llm.plugin:register"

[project.entry-points."ai_mini_box.help"]
llm = "ai_mini_box_llm"

[tool.hatch.build]
include = ["ai_mini_box_llm/**"]
