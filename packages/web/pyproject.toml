[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-mini-box-web"
version = "0.1.0"
description = "Web interface (PWA) for ai-mini-box-core"
requires-python = ">=3.12"
readme = "README.md"
license = { file = "LICENSE" }
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business",
]
dependencies = [
    "ai-mini-box-core>=5.0.0",
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[project.optional-dependencies]
dev = ["pytest>=8", "httpx>=0.28"]

[project.entry-points."ai_mini_box.tools"]
web = "ai_mini_box_web.commands:register"

[tool.hatch.build]
include = ["ai_mini_box_web/**"]

[project.urls]
Homepage = "https://github.com/Kibertum/ai-mini-box"
Repository = "https://github.com/Kibertum/ai-mini-box"
